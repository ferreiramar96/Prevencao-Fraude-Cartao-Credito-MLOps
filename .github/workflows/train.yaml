name: Train Model

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with: 
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: pytest -v

  train:
    runs-on: ubuntu-latest
    needs: tests
    env:
      URL_MLFLOW: ${{ secrets.URL_MLFLOW }}
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with: 
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python scripts/train.py
        